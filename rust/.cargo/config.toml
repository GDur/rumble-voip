[target.x86_64-apple-darwin]
rustflags = ["-C", "target-cpu=x86-64-v3"] # Modern Intel/AMD features (AVX2, etc.)

[target.aarch64-apple-darwin]
rustflags = ["-C", "target-cpu=apple-m1"] # Optimized for Apple Silicon

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=x86-64-v3"]

[target.aarch64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=native"]

[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-cpu=x86-64-v3"]

[target.aarch64-apple-ios]
rustflags = ["-C", "target-cpu=apple-a14"] # Modern iPhone (A14/iPhone 12+)

[target.aarch64-apple-ios-sim]
rustflags = ["-C", "target-cpu=apple-m1"]

[target.x86_64-apple-ios]
rustflags = ["-C", "target-cpu=x86-64-v3"]

[target.aarch64-linux-android]
rustflags = ["-C", "target-cpu=generic-armv8-a+neon+crc+crypto"]

[target.x86_64-linux-android]
rustflags = ["-C", "target-cpu=x86-64-v3"]

[env]
IPHONEOS_DEPLOYMENT_TARGET = "18.0"
CFLAGS = "-O3"
CXXFLAGS = "-O3"
