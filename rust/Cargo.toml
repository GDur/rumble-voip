[package]
name = "rust_lib_rumble"
version = "0.1.0"
edition = "2021"
build = "build.rs"

[lib]
crate-type = ["cdylib", "staticlib"]

[dependencies]
flutter_rust_bridge = "=2.11.1"
cpal = "0.15"
ringbuf = "0.4"
once_cell = "1.21"
tokio = { version = "1.50", features = ["full"] }
mumble-protocol-2x = "0.6"
openssl = { version = "0.10", features = ["vendored"] }
rubato = "1.0.1"
audioadapter = "2.0"
audioadapter-buffers = "2.0"
tokio-util = { version = "0.7", features = ["codec", "net"] }
futures-util = "0.3"
tokio-openssl = "0.6"
protobuf = "3.7"
bytes = "1.11"
parking_lot = "0.12"
anyhow = "1.0"
byteorder = "1.5"
opus-head-sys = "0.1"

[profile.dev]
opt-level = 3

[profile.release]
opt-level = 3
lto = "thin"
strip = "symbols"
