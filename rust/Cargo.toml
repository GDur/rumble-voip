[package]
name = "rust_lib_rumble"
version = "0.1.0"
edition = "2021"
build = "build.rs"

[lib]
crate-type = ["cdylib", "staticlib"]

[dependencies]
flutter_rust_bridge = "=2.11.1"
opus-rs = "0.1"
cpal = "0.15"
ringbuf = "0.4"
once_cell = "1.19"
tokio = { version = "1.36", features = ["full"] }
mumble-protocol-2x = "0.6"
openssl = { version = "0.10", features = ["vendored"] }
tokio-util = { version = "0.7", features = ["codec", "net"] }
futures-util = "0.3"
tokio-openssl = "0.6"
protobuf = "3.2"
bytes = "1.5"
parking_lot = "0.12"
log = "0.4"
oslog = "0.2"
env_logger = "0.11"
anyhow = "1.0"
byteorder = "1.5"
hound = "3.5"

[profile.dev]
opt-level = 3

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = "symbols"
