name: Windows Build

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Enable Long Paths
        # This is required because MSVC and Rust build paths often exceed the 260-character Windows limit (MAX_PATH).
        run: |
          git config --global core.longpaths true
          reg add "HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\FileSystem" /v LongPathsEnabled /t REG_DWORD /d 1 /f

      - name: Setup Virtual Drive for Short Path
        # Mapping the workspace to a drive letter (P:\) and using a subfolder avoids
        # issues where Flutter tools fail when the project is at the drive root.
        run: |
          $repoPath = "${{ github.workspace }}"
          $parentPath = Split-Path -Parent $repoPath
          $repoDirName = Split-Path -Leaf $repoPath
          subst P: "$parentPath"
          echo "WORKSPACE_ROOT=P:\$repoDirName" >> $env:GITHUB_ENV

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust"

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create .env file
        # The .env file is a required asset in pubspec.yaml but is ignored by git.
        # We create an empty one to satisfy the Flutter asset requirement.
        run: New-Item -Path .env -ItemType File
        working-directory: ${{ env.WORKSPACE_ROOT }}

      - name: Fetch Flutter dependencies
        run: flutter pub get
        working-directory: ${{ env.WORKSPACE_ROOT }}

      - name: Get version from tag
        shell: bash
        run: |
          # Extract version from tag (e.g., v0.1.123 -> 0.1.123)
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

      - name: Build Windows
        run: flutter build windows --release --build-name=${{ env.APP_VERSION }} -v
        working-directory: ${{ env.WORKSPACE_ROOT }}

      - name: Package Windows Build (Zip)
        shell: pwsh
        run: |
          $buildPath = "${{ env.WORKSPACE_ROOT }}\build\windows\x64\runner\Release\"
          $zipPath = "${{ env.WORKSPACE_ROOT }}\rumble-windows-x64.zip"
          Compress-Archive -Path "$buildPath\*" -DestinationPath $zipPath
          echo "ZIP_PATH=$zipPath" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.ZIP_PATH }}
          name: Rumble ${{ env.TAG_NAME }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
