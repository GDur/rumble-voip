name: Windows Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Enable Long Paths
        # This is required because MSVC and Rust build paths often exceed the 260-character Windows limit (MAX_PATH).
        run: |
          git config --global core.longpaths true
          reg add "HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\FileSystem" /v LongPathsEnabled /t REG_DWORD /d 1 /f

      - name: Setup Virtual Drive for Short Path
        # Mapping the workspace to a drive letter (P:\) and using a subfolder avoids
        # issues where Flutter tools fail when the project is at the drive root.
        run: |
          $repoPath = "${{ github.workspace }}"
          $parentPath = Split-Path -Parent $repoPath
          $repoDirName = Split-Path -Leaf $repoPath
          subst P: "$parentPath"
          echo "WORKSPACE_ROOT=P:\$repoDirName" >> $env:GITHUB_ENV

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust"

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create .env file
        # The .env file is a required asset in pubspec.yaml but is ignored by git.
        # We create an empty one to satisfy the Flutter asset requirement.
        run: New-Item -Path .env -ItemType File
        working-directory: ${{ env.WORKSPACE_ROOT }}

      - name: Fetch Flutter dependencies
        run: flutter pub get
        working-directory: ${{ env.WORKSPACE_ROOT }}

      - name: Build Windows
        run: flutter build windows --release -v
        working-directory: ${{ env.WORKSPACE_ROOT }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rumble-Windows-Release
          path: ${{ env.WORKSPACE_ROOT }}\build\windows\x64\runner\Release\
