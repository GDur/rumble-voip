name: Windows Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Windows Dependencies
        run: |
          choco install nasm strawberryperl just
          # Ensure NASM is in PATH for the current session
          echo "C:\Program Files\NASM" >> $GITHUB_PATH

      - name: Install Flutter-Rust Bridge CLI
        run: cargo install flutter_rust_bridge_codegen --version 2.11.1

      - name: Fetch Flutter dependencies
        run: flutter pub get

      - name: Generate Flutter-Rust Bridge Bindings
        run: just gen

      - name: Build Windows
        run: flutter build windows --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rumble-Windows-Release
          path: build/windows/x64/runner/Release/
