name: rumble
description: "Rumble: A modern, cross-platform Mumble voice chat client built with Flutter."
publish_to: 'none'

version: 0.15.1+22

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  package_info_plus: ^8.1.1

  flutter_rust_bridge: 2.11.1
  shadcn_ui: ^0.52.1
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  flutter_macos_permissions: ^2.0.8
  ffi: ^2.1.3
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4
  hotkey_manager: ^0.2.3
  window_manager: ^0.5.1
  basic_utils: ^5.8.2
  file_picker: ^10.3.10
  flutter_widget_from_html_core: ^0.17.0
  url_launcher: ^6.3.2
  intl: ^0.20.2
  connectivity_plus: ^7.0.0
  freezed_annotation: ^3.1.0
  rust_lib_rumble:
    path: rust_builder
  logging: ^1.3.0
  pasteboard: ^0.5.0
  image: ^4.8.0
  photo_view: ^0.15.0
  dumble: ^0.8.9
  flutter_dotenv: ^6.0.0
  flutter_foreground_task: ^9.2.1
  wakelock_plus: ^1.2.1
  markdown: ^7.3.1
  html2md: ^1.3.2
  flutter_widget_from_html: ^0.17.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  freezed: ^3.2.5
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4
  build_runner: ^2.13.1
  integration_test:
    sdk: flutter
  mocktail: ^1.0.4

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  macos:
    generate: true
    image_path: "assets/splash_with_bg.png"
  windows:
    generate: true
    image_path: "assets/splash_foreground.png"
  web:
    generate: true
    image_path: "assets/splash_foreground.png"
  image_path: "assets/icon_android.png"
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/icon_android.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0F172A"
  image: assets/splash_foreground.png
  android: true
  ios: true
  fullscreen: true
  android_12:
    image: assets/splash_foreground.png
    color: "#0F172A"

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/splash_foreground.png
    - assets/splash_with_bg.png
    - .env
    - test_original_f32.pcm

dependency_overrides:
  pointycastle: ^4.0.0
